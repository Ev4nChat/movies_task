version: '3.8'
services:
  db:
    image: mysql:8
    container_name: my_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: movies_db
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  php:
    build: .
    container_name: php_faker
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy  # Waits for MySQL to be ready
    command: ["php", "Faker.php"]